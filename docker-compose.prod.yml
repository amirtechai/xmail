# Production overrides — usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (set in shell or a .env.prod file):
#   DOMAIN, ACME_EMAIL, SECRET_KEY, DB_PASSWORD, GRAFANA_ADMIN_PASSWORD,
#   FLOWER_BASIC_AUTH  (user:hashed_password — generate with htpasswd)

services:

  # ── Traefik reverse proxy ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.2
    container_name: xmail-traefik
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_acme:/etc/traefik/acme
    networks:
      - xmail-network
    labels:
      - "traefik.enable=true"
      # Traefik dashboard (internal only — protected by IP allowlist in dynamic.yml)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=admin-only@file"

  # ── Postgres — no public port in prod ───────────────────────────────────────
  postgres:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ── Redis — no public port in prod ──────────────────────────────────────────
  redis:
    ports: !reset []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    ports: !reset []
    restart: always
    environment:
      - APP_ENV=production
      - LOG_LEVEL=warning
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.middlewares=security-headers@file,rate-limit@file"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    restart: always
    environment:
      - APP_ENV=production
      - LOG_LEVEL=warning
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Celery beat ──────────────────────────────────────────────────────────────
  beat:
    restart: always
    environment:
      - APP_ENV=production
      - LOG_LEVEL=warning
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Flower — behind basic auth ───────────────────────────────────────────────
  flower:
    ports: !reset []
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
      - "traefik.http.routers.flower.middlewares=flower-auth@file,admin-only@file"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    ports: !reset []
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${DOMAIN}/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ── Prometheus — internal only ───────────────────────────────────────────────
  prometheus:
    ports: !reset []
    restart: always
    labels:
      - "traefik.enable=false"

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    ports: !reset []
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_SERVER_DOMAIN=grafana.${DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.middlewares=security-headers@file,admin-only@file"

volumes:
  traefik_acme:
